<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhatsApp 2</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Arial, sans-serif;
        background: #111b21;
        color: #e9edef;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      header {
        background: #202c33;
        padding: 1rem;
        font-size: 1.1rem;
        font-weight: bold;
        border-bottom: 1px solid #2a3942;
      }

      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      #messages li {
        list-style: none;
        background: #005c4b;
        padding: 0.5rem 0.75rem;
        border-radius: 8px;
        max-width: 70%;
        align-self: flex-end;
        word-break: break-word;
      }

      form {
        display: flex;
        padding: 0.75rem;
        background: #202c33;
        gap: 0.5rem;
        border-top: 1px solid #2a3942;
      }

      #input {
        flex: 1;
        padding: 0.6rem 1rem;
        border-radius: 20px;
        border: none;
        background: #2a3942;
        color: #e9edef;
        font-size: 1rem;
        outline: none;
      }

      button {
        background: #00a884;
        color: white;
        border: none;
        border-radius: 50%;
        width: 44px;
        height: 44px;
        font-size: 1.2rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      button:hover {
        background: #017561;
      }
    </style>
  </head>
  <body>
    <header>WhatsApp 2</header>
    <ul id="messages"></ul>
    <form id="form">
      <input id="input" autocomplete="off" placeholder="Escribe un mensaje..." />
      <button type="submit">&#9658;</button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const messages = document.getElementById('messages');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const message = input.value.trim();
            if (message) {
                socket.emit('chat message', message);
                input.value = '';
            }
        });

        socket.on('chat message', (msg) => {
            const li = document.createElement('li');
            li.textContent = msg;
            messages.appendChild(li);
            messages.scrollTop = messages.scrollHeight;
        });
    </script>
  </body>
</html>
